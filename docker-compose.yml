services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: notification-app

    entrypoint: /usr/local/bin/entrypoint.sh

    ports:
      - "8080:80"

    volumes:
      - ./src:/var/www/html

    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public

      APP_ENV: local
      APP_DEBUG: "true"

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notifications
      DB_USERNAME: user
      DB_PASSWORD: password

      SESSION_DRIVER: array
      CACHE_STORE: file

      QUEUE_CONNECTION: rabbitmq

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_LOGIN: guest
      RABBITMQ_PASSWORD: guest

    depends_on:
      postgres:
        condition: service_healthy

      rabbitmq:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

  postgres:
    image: postgres:15-alpine

    container_name: notification-postgres

    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management-alpine

    container_name: notification-rabbitmq

    ports:
      - "5673:5672"
      - "15673:15672"

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: notification-worker

    entrypoint: /usr/local/bin/entrypoint-worker.sh

    restart: unless-stopped

    volumes:
      - ./src:/var/www/html

    environment:
      APP_ENV: local

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notifications
      DB_USERNAME: user
      DB_PASSWORD: password

      CACHE_STORE: file

      QUEUE_CONNECTION: rabbitmq

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_LOGIN: guest
      RABBITMQ_PASSWORD: guest

    depends_on:
      postgres:
        condition: service_healthy

      rabbitmq:
        condition: service_healthy

      app:
        condition: service_healthy

volumes:
  postgres_data: